<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telma School - Catálogo Digital 📚</title>
    <style>
        /* DISEÑO DE LA APP */
        :root {
            --primario: #ff6b6b;
            --secundario: #48dbfb;
            --acento: #feca57;
            --fondo: #fdfae2;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fondo);
            background-image: url("https://www.transparenttextures.com/patterns/mathematics.png");
            color: #333;
        }

        /* HEADER ESTILO MOSAICO */
        header {
            background: linear-gradient(135deg, var(--primario), var(--acento));
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-bottom: 6px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            text-shadow: 2px 2px #c0392b;
        }

        header p { margin: 5px 0 0; opacity: 0.9; font-weight: bold; }

        /* CONTENEDOR PRINCIPAL */
        .app-container {
            padding: 15px;
            max-width: 600px; /* Tamaño ideal para móvil */
            margin: 0 auto;
        }

        .seccion-titulo {
            background: var(--secundario);
            color: white;
            padding: 10px 20px;
            border-radius: 25px 5px 25px 5px;
            display: inline-block;
            margin: 20px 0 10px;
            font-weight: bold;
            box-shadow: 3px 3px 0px #2980b9;
        }

        /* CARRUSEL DE MOVIMIENTO */
        .carousel-wrapper {
            overflow: hidden;
            background: rgba(255,255,255,0.6);
            border-radius: 15px;
            padding: 10px 0;
        }

        .carousel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Ocultar barra de scroll */
        .carousel::-webkit-scrollbar { display: none; }

        /* TARJETA DE PRODUCTO */
        .card {
            min-width: 160px;
            background: white;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            border: 2px solid #ddd;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card:active { transform: scale(0.95); }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 10px;
        }

        .card h4 { margin: 10px 0 5px; font-size: 0.9rem; height: 35px; overflow: hidden; }
        
        .precio {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        .tag {
            background: #eee;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            color: #777;
        }

    </style>
</head>
<body>

    <header>
        <h1>✏️ Telma School</h1>
        <p>¡Tu lista escolar lista hoy! 🎒✨</p>
    </header>

    <div class="app-container">
        
        <div class="seccion-titulo">📓 Útiles Escolares</div>
        <div class="carousel-wrapper">
            <div class="carousel" id="cat1">
                <div class="card">
                    <img src="https://m.media-amazon.com/images/I/71Y8w4hL1FL._AC_SL1500_.jpg" alt="">
                    <h4>Cuaderno Espiral 1 Materia</h4>
                    <span class="precio">L. 45.00</span>
                    <span class="tag">Scribe</span>
                </div>
                <div class="card">
                    <img src="https://m.media-amazon.com/images/I/81xU+KxR9tL._AC_SL1500_.jpg" alt="">
                    <h4>Carpeta Oxford Azul</h4>
                    <span class="precio">L. 3
