<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telma School - ¡Tu Tienda Escolar Mágica! 📚🎨</title>
    
    <style>
        /* Fondo con patrón escolar y colores pastel */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #fdfae2;
            background-image: url("https://www.transparenttextures.com/patterns/mathematics.png");
            color: #333;
            overflow-x: hidden;
        }

        /* Banner Principal Animado */
        header {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
            padding: 60px 20px;
            text-align: center;
            color: white;
            position: relative;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            border-bottom: 8px solid #fff;
            overflow: hidden;
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 3px 3px 0px #c0392b;
            animation: bounceInDown 1s both;
        }

        header p {
            font-size: 1.3rem;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            animation: fadeIn 2s both;
        }

        /* Iconos flotantes en el banner */
        .floating-icon {
            position: absolute;
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }

        @keyframes bounceInDown {
            0% { opacity: 0; transform: translateY(-100px); }
            60% { opacity: 1; transform: translateY(20px); }
            100% { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Contenedor de Categorías */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .categoria-section {
            margin-bottom: 50px;
        }

        h2.categoria-titulo {
            background-color: #ff9f43;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 4px 4px 0px #d35400;
            margin-left: 10px;
            font-size: 1.8rem;
        }

        /* Carrusel Dinámico */
        .carousel-container {
            position: relative;
            overflow: hidden;
            padding: 10px 0;
        }

        .carousel {
            display: flex;
            gap: 25px;
            padding: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            /* Ocultar barra de desplazamiento para estética */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        /* Tarjeta de Producto con Animación */
        .producto-card {
            min-width: 200px;
            max-width: 200px;
            background: white;
            border: 4px solid #48dbfb;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }

            box-shadow: 0 10px 20px rgba(0,0,0,0.2
