<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recargas Tigo - Enlace Rápido</title>
    <style>
        :root {
            --tigo-blue: #00377d;
            --tigo-light-blue: #00a1e1;
            --accent-green: #25d366;
            --bg-gray: #f0f2f5;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-gray);
            color: #333;
        }

        header {
            background-color: var(--tigo-blue);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        /* --- PESTAÑAS (TABS) --- */
        .tabs-container {
            display: flex;
            justify-content: center;
            background: white;
            border-bottom: 2px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            padding: 15px 25px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--tigo-blue);
            border-bottom: 3px solid var(--tigo-blue);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .section-content { display: none; }
        .section-content.active { display: block; }

        /* --- GRID DE SALDO NORMAL --- */
        .saldo-normal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px 0;
        }

        .saldo-btn {
            background: white;
            border: 2px solid var(--tigo-blue);
            border-radius: 10px;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: var(--tigo-blue);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .saldo-btn:hover {
            background: var(--tigo-blue);
            color: white;
            transform: scale(1.05);
        }

        /* --- GRID DE SUPER RECARGAS --- */
        .super-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 6px solid var(--tigo-light-blue);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: var(--tigo-blue); font-size: 18px; }
        .price-tag { font-size: 22px; color: #28a745; font-weight: bold; margin-bottom: 10px; display: block; }
        .details { font-size: 14px; color: #555; margin-bottom: 15px; line-height: 1.4; }
        .vigencia { font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; }

        .app-icons { display: flex; gap: 8px; margin-top: 10px; }
        .app-icons img { width: 22px; height: 22px; }

        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            position: relative;
        }

        .input-num {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
            box-sizing: border-box;
        }

        .btn-ws {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 15px 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .super-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Portal de Recargas</h1>

<div class="tabs-container">
    <button class="tab-btn active" onclick="showSection('super')">Súper Recargas</button>
    <button class="tab-btn" onclick="showSection('normal')">Saldo Normal</button>
</div>

<div class="container">
    <div id="super" class="section-content active">
        <div class="super-grid" id="superGrid">
            </div>
    </div>

    <div id="normal" class="section-content">
